name: Build Cross-Platform Executables

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-matrix:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install application module first
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libgl1-mesa-glx \
            libfontconfig1 \
            libglib2.0-0

      - name: Install remaining dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: Run tests
        run: |
          pip install -r requirements-test.txt
          pytest tests/ -v --cov=commerzbank_fints_qt_desktop_app --cov-report=xml || echo "Tests skipped - focusing on build"

      - name: Build with PyInstaller
        run: |
          pyinstaller commerzbank_fints.spec --clean --noconfirm

      - name: Verify build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if exist "dist\CommerzbankFinTS_Payout_Automator.exe" (
            echo "Build successful!"
            dir "dist\CommerzbankFinTS_Payout_Automator.exe"
          ) else (
            echo "Build failed - executable not found"
            exit 1
          )
        shell: cmd

      - name: Verify build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -f "dist/CommerzbankFinTS_Payout_Automator.app/Contents/MacOS/CommerzbankFinTS_Payout_Automator" ]; then
            echo "Build successful!"
            ls -lh "dist/CommerzbankFinTS_Payout_Automator.app"
          else
            echo "Build failed - executable not found"
            exit 1
          fi

      - name: Verify build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -f "dist/CommerzbankFinTS_Payout_Automator" ]; then
            echo "Build successful!"
            ls -lh "dist/CommerzbankFinTS_Payout_Automator"
          else
            echo "Build failed - executable not found"
            exit 1
          fi

      - name: Create package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir installer
          copy dist\CommerzbankFinTS_Payout_Automator.exe installer\
          copy README.md installer\
          copy LICENSE installer\
          Compress-Archive -Path installer\* -DestinationPath "CommerzbankFinTS_Payout_Automator-Windows.zip"
        shell: pwsh

      - name: Create package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p installer
          cp -R dist/CommerzbankFinTS_Payout_Automator.app installer/
          cp README.md LICENSE installer/
          zip -r "CommerzbankFinTS_Payout_Automator-macOS.zip" installer/

      - name: Create package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p installer
          cp dist/CommerzbankFinTS_Payout_Automator installer/
          cp README.md LICENSE installer/
          tar -czf "CommerzbankFinTS_Payout_Automator-Linux.tar.gz" installer/

      - name: Upload platform-specific artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-executable
          path: |
            *.zip
            *.tar.gz
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
            *.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-matrix
    if: github.event_name == 'workflow_dispatch' && inputs.create_release == true

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release ${{ inputs.release_tag }}
          files: artifacts/*/*.zip,artifacts/*/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Generate Build Summary
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Cross-Platform Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.build-matrix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.build-matrix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.build-matrix.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Check the Actions tab for platform-specific executables." >> $GITHUB_STEP_SUMMARY
