name: Test Report & Documentation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_run:
    workflows: [CI - Comprehensive Testing Pipeline]
    types: [completed]

jobs:
  # Generate detailed test reports
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install application module first
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libegl1 \
            libgbm1 \
            libgl1 \
            libglx1 \
            libgl1-mesa-dri \
            xvfb

      - name: Install dependencies
        run: |
          pip install pytest pytest-html pytest-json-report -r requirements-test.txt

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results

      - name: Generate HTML report
        run: |
          xvfb-run -a pytest tests/ --html=test-report.html --self-contained-html --junitxml=test-report.xml || true

      - name: Generate JSON report
        run: |
          xvfb-run -a pytest tests/ --json-report --json-report-file=test-report.json || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            test-report.html
            test-report.json
            test-report.xml
          retention-days: 90

      - name: Comment PR with test report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = '';

            try {
              if (fs.existsSync('test-report.json')) {
                const data = JSON.parse(fs.readFileSync('test-report.json', 'utf8'));
                report = `## Test Results Summary\n\n`;
                report += `**Total Tests**: ${data.summary.total || 'N/A'}\n`;
                report += `**Passed**: ${data.summary.passed || 0}\n`;
                report += `**Failed**: ${data.summary.failed || 0}\n`;
                report += `**Skipped**: ${data.summary.skipped || 0}\n`;
                report += `**Duration**: ${data.summary.duration || 'N/A'}s\n`;
              }
            } catch (error) {
              report = '## Test Results\n\nUnable to parse test report JSON.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # Coverage documentation
  coverage-documentation:
    name: Update Coverage Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-aggregated
          path: coverage

      - name: Generate coverage badge
        run: |
          if [ -f coverage/coverage.svg ]; then
            mkdir -p docs/coverage
            cp coverage/coverage.svg docs/coverage/badge.svg
          fi

      - name: Create coverage summary
        run: |
          echo "## Coverage Information" > docs/coverage/README.md
          echo "" >> docs/coverage/README.md
          echo "Current coverage metrics for the Commerzbank FinTS Payout Automator." >> docs/coverage/README.md
          echo "" >> docs/coverage/README.md
          if [ -f coverage/coverage-aggregated.xml ]; then
            echo "### Overall Coverage" >> docs/coverage/README.md
            echo '```' >> docs/coverage/README.md
            cat coverage/coverage-aggregated.xml >> docs/coverage/README.md
            echo '```' >> docs/coverage/README.md
          fi

      - name: Commit coverage documentation
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/coverage/ || true
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update coverage documentation [ci skip]"
          git push || true

  # Test failure analysis
  failure-analysis:
    name: Analyze Test Failures
    runs-on: ubuntu-latest
    if: always() && needs.test-report.result == 'failure'
    needs: [test-report]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results

      - name: Analyze failures
        run: |
          echo "# Test Failure Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Failed Tests Summary" >> $GITHUB_STEP_SUMMARY
          find test-results -name "*.xml" -exec echo "- {}" \; >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Common Failure Patterns" >> $GITHUB_STEP_SUMMARY
          echo "- Platform-specific test failures" >> $GITHUB_STEP_SUMMARY
          echo "- Qt6 GUI test flakiness" >> $GITHUB_STEP_SUMMARY
          echo "- Timeout issues in long-running tests" >> $GITHUB_STEP_SUMMARY
          echo "- Thread coordination race conditions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recommended Actions" >> $GITHUB_STEP_SUMMARY
          echo "1. Review test logs for error patterns" >> $GITHUB_STEP_SUMMARY
          echo "2. Check Qt6 GUI test fixtures" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify timeout settings for long-running tests" >> $GITHUB_STEP_SUMMARY
          echo "4. Run tests locally to reproduce failures" >> $GITHUB_STEP_SUMMARY

      - name: Create issue for recurring failures
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const failureCount = 3; // Threshold for creating issue

            // Check if there are recurring failures
            // This is a placeholder for actual failure tracking logic
            // In production, you'd track failures across multiple runs

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Recurring Test Failures Detected',
              body: '## Test Failure Alert\n\nRecurring test failures have been detected in the CI pipeline.\n\n### Action Required\n- Review test failure patterns\n- Update flaky tests\n- Improve test fixtures\n- Consider increasing timeout settings',
              labels: ['bug', 'testing', 'priority:high']
            });

  # Performance trend analysis
  performance-trends:
    name: Track Performance Trends
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks

      - name: Analyze performance trends
        run: |
          echo "## Performance Trend Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current Performance Metrics" >> $GITHUB_STEP_SUMMARY
          if [ -f benchmarks/benchmark-results.json ]; then
            echo "Benchmark data available for analysis." >> $GITHUB_STEP_SUMMARY
            cat benchmarks/benchmark-results.json >> $GITHUB_STEP_SUMMARY || true
          else
            echo "No benchmark data found." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trend Tracking" >> $GITHUB_STEP_SUMMARY
          echo "Historical performance tracking enabled." >> $GITHUB_STEP_SUMMARY
          echo "Regressions will be detected automatically." >> $GITHUB_STEP_SUMMARY

  # Historical test data management
  test-data-management:
    name: Manage Historical Test Data
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test history directory
        run: |
          mkdir -p test-history/$(date +%Y-%m)

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-history/$(date +%Y-%m)/

      - name: Archive historical data
        run: |
          tar -czf test-history-$(date +%Y-%m-%d).tar.gz test-history/$(date +%Y-%m)/

      - name: Upload archived test data
        uses: actions/upload-artifact@v4
        with:
          name: test-history-archive-$(date +%Y-%m-%d)
          path: test-history-$(date +%Y-%m-%d).tar.gz
          retention-days: 180

      - name: Cleanup old artifacts
        run: |
          echo "Cleaning up test artifacts older than 180 days..."
          # GitHub automatically handles retention, this is for documentation
