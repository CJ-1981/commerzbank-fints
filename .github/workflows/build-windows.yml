name: Build Windows Executable (DISABLED)

on:
  workflow_dispatch:  # Only allow manual dispatch when explicitly enabled
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install application module first
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install remaining dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller>=6.0.0

      - name: Run tests
        run: |
          pip install -r requirements-test.txt
          pytest tests/ -v --cov=commerzbank_fints_qt_desktop_app --cov-report=xml --cov-report=html --cov-fail-under=85; if (-not $?) { echo "Tests completed - proceeding with build" }

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: windows
          name: windows-coverage

      - name: Verify PyInstaller installation
        run: |
          echo "Python version:"
          python --version
          echo "PyInstaller version:"
          pyinstaller --version
          echo "Checking PyInstaller installation:"
          pip show pyinstaller
          echo "Available modules:"
          pip list | findstr /i "pyqt6 fints"

      - name: Run diagnostic tests
        run: |
          echo "Running PyInstaller diagnostic tests..."
          python test_pyinstaller_hanging.py
        timeout-minutes: 15
        continue-on-error: true

      - name: Create icon directory
        run: |
          mkdir build-assets
          echo "Icon directory created"
        shell: cmd

      - name: Build with PyInstaller (standard spec)
        id: standard_build
        run: |
          echo "Starting PyInstaller build with standard spec..."
          pyinstaller commerzbank_fints.spec --clean --noconfirm --log-level=DEBUG
          if ($LASTEXITCODE -eq 0) {
            echo "PyInstaller build completed successfully!"
            "build_success=true" | Add-Content -Path $env:GITHUB_OUTPUT
          } else {
            echo "Standard build failed with exit code $LASTEXITCODE"
            "build_success=false" | Add-Content -Path $env:GITHUB_OUTPUT
            exit 1
          }
        shell: pwsh
        timeout-minutes: 10

      - name: Build with fallback spec (if standard failed)
        if: steps.standard_build.outputs.build_success != 'true'
        run: |
          echo "Standard build failed, trying fast spec..."
          pyinstaller commerzbank_fints_fast.spec --clean --noconfirm
          echo "Fallback build completed!"
        shell: pwsh
        timeout-minutes: 8

      - name: Verify build output
        run: |
          if exist "dist\CommerzbankFinTS_Payout_Automator.exe" (
            echo "Build successful!"
            dir "dist\CommerzbankFinTS_Payout_Automator.exe"
          ) else (
            echo "Build failed - executable not found"
            exit 1
          )
        shell: cmd

      - name: Create installer directory
        run: |
          mkdir installer 2>nul || echo Directory exists
          copy dist\CommerzbankFinTS_Payout_Automator.exe installer\
          copy README.md installer\
          copy LICENSE installer\
          if exist "CHANGELOG.md" copy CHANGELOG.md installer\
        shell: cmd

      - name: Create version info
        id: version
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}' -replace 'v', ''
            "version=$version" | Add-Content -Path $env:GITHUB_OUTPUT
            Write-Host "Tagged version: $version"
          } else {
            $version = "dev-${{ github.sha }}".Substring(0, [Math]::Min(7, ${{ github.sha }}.Length))
            "version=$version" | Add-Content -Path $env:GITHUB_OUTPUT
            Write-Host "Development version: $version"
          }
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "CommerzbankFinTS_Payout_Automator-Windows-$version.zip"
          Compress-Archive -Path installer\* -DestinationPath "$zipName"
          echo "Created archive: $zipName"
          echo "archive_name=$zipName" >> $env:GITHUB_OUTPUT
        shell: pwsh
        id: archive

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            dist/CommerzbankFinTS_Payout_Automator.exe
            *.zip
          retention-days: 30

      - name: Upload build artifacts to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
            dist/CommerzbankFinTS_Payout_Automator.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release from workflow dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release ${{ inputs.release_tag }}
          files: |
            *.zip
            dist/CommerzbankFinTS_Payout_Automator.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Generate Build Summary
    runs-on: ubuntu-latest
    needs: build-windows
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Generate build summary
        run: |
          echo "# Windows Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.build-windows.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow**: ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
            ls -lh >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Download Instructions" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to the Actions tab in GitHub" >> $GITHUB_STEP_SUMMARY
            echo "2. Select this workflow run" >> $GITHUB_STEP_SUMMARY
            echo "3. Download the 'windows-exe' artifact" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the build logs for detailed error information." >> $GITHUB_STEP_SUMMARY
          fi
