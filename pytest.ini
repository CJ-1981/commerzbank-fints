[pytest]
# Pytest configuration for Commerzbank FinTS Payout Automator CI/CD

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version requirements
minversion = 7.0

# Test execution options
addopts =
    # Verbose output showing individual test names
    -v

    # Show local variables in tracebacks
    --showlocals

    # Show summary of test session outcome
    -ra

    # Coverage reporting with 85% target
    --cov=commerzbank_fints_qt_desktop_app
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing:skip-covered
    --cov-fail-under=85

    # Strict marker usage
    --strict-markers

    # Warn about unraisable exceptions
    -W error::ResourceWarning
    -W ignore::DeprecationWarning

    # Show slowest tests
    --durations=10

    # JUnit XML for CI integration
    --junitxml=test-results.xml

# CI-specific options (added via command line in workflows)
# These require additional plugins: pytest-timeout, pytest-xdist
# --timeout=900 -n auto --dist=loadscope

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    gui: marks tests that require GUI interaction
    network: marks tests that require network access (should be mocked)
    threading: marks tests related to thread coordination
    financial: marks tests related to financial calculations
    iban: marks tests for IBAN validation
    error: marks tests for error handling
    import: marks tests for data import functionality
    benchmark: marks tests for performance benchmarking

# Coverage options
[coverage:run]
source = commerzbank_fints_qt_desktop_app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */dist-packages/*
    */dist/*
    */build/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
